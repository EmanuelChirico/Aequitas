<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aequitas — {% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f8fafc;
      --surface:      #ffffff;
      --border:       #e2e8f0;
      --border-hover: #cbd5e1;
      --primary:      #4f46e5;
      --primary-hov:  #4338ca;
      --primary-light:#eef2ff;
      --text:         #0f172a;
      --text-sec:     #475569;
      --text-muted:   #64748b;
      --ok:           #10b981;
      --ok-bg:        #ecfdf5;
      --ok-border:    #a7f3d0;
      --fail:         #ef4444;
      --fail-bg:      #fef2f2;
      --fail-border:  #fca5a5;
      --warn:         #f59e0b;
      --warn-bg:      #fffbeb;
      --warn-border:  #fde68a;
      --navy:         #0f172a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar Moderna ── */
    nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--navy);
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .nav-brand .accent { color: var(--primary); }
    .nav-links { display: flex; gap: .5rem; margin-left: auto; align-items: center; }
    nav a {
      color: var(--text-sec);
      text-decoration: none;
      padding: .5rem .85rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      transition: all .2s ease;
    }
    nav a:hover { background: var(--primary-light); color: var(--primary); }
    .nav-logout { color: var(--fail); font-weight: 500; }
    .nav-logout:hover { background: var(--fail-bg); color: var(--fail); }

    /* ── Layout Wrapper ── */
    .page { max-width: 800px; margin: 3rem auto; padding: 0 1.5rem 5rem; }

    /* ── Tipografia ── */
    h1 {
      font-size: 1.85rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 1.5rem;
      letter-spacing: -.02em;
    }
    h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--navy);
      margin-top: 2rem;
      margin-bottom: 1rem;
      letter-spacing: -.01em;
    }

    /* ── Cards Premium ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin: 1.25rem 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .card.ok   { border-left: 4px solid var(--ok);   background: var(--ok-bg);   box-shadow: none; }
    .card.fail { border-left: 4px solid var(--fail); background: var(--fail-bg); box-shadow: none; }
    .card.warn { border-left: 4px solid var(--warn); background: var(--warn-bg); box-shadow: none; }

    /* ── Badges di Stato ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .35rem .75rem;
      border-radius: 99px;
      font-weight: 600;
      font-size: .8rem;
      letter-spacing: .02em;
    }
    .status-badge.ok   { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-border); }
    .status-badge.fail { background: var(--fail-bg); color: var(--fail); border: 1px solid var(--fail-border); }
    .status-badge.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }

    /* ── Tabelle Pulite ── */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin: 1rem 0;
      box-shadow: 0 2px 4px rgba(0,0,0,.02);
    }
    table { border-collapse: collapse; width: 100%; font-size: .9rem; }
    th, td { padding: .85rem 1.2rem; text-align: left; border-bottom: 1px solid var(--border); }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: var(--text-sec);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    /* ── Pulsanti e Input ── */
    input[type=submit], button, .btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .7rem 1.5rem;
      font-size: .92rem;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      transition: all .15s ease;
      box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
    }
    input[type=submit]:hover, button:hover, .btn:hover {
      background: var(--primary-hov);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
      transform: translateY(-1px);
      color: #fff;
    }
    input[type=submit]:active, button:active, .btn:active { transform: translateY(0); }
    .btn-secondary { background: #475569; box-shadow: none; }
    .btn-secondary:hover { background: #334155; box-shadow: 0 4px 12px rgba(71, 85, 105, 0.2); }

    input[type=text], input[type=password] {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .6rem 1rem;
      font-size: .92rem;
      font-family: inherit;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: all .15s ease;
      width: 100%;
      max-width: 320px;
    }
    input[type=text]:focus, input[type=password]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    /* ── Schede di Voto (Radio custom) ── */
    fieldset {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      background: var(--surface);
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 4px rgba(0,0,0,.02);
    }
    legend {
      font-weight: 700;
      color: var(--navy);
      padding: 0 .6rem;
      font-size: 1.05rem;
      letter-spacing: -.01em;
    }
    label.choice {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .85rem 1.2rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      margin-top: .6rem;
      transition: all .2s ease;
      font-weight: 500;
    }
    label.choice:hover { border-color: var(--border-hover); background: #fafafa; }
    label.choice:has(input[type=radio]:checked) {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    input[type=radio] { accent-color: var(--primary); width: 18px; height: 18px; }

    /* ── Avvisi e Flash messages ── */
    .flash {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 12px;
      padding: .85rem 1.2rem;
      margin: 1rem 0;
      font-size: .9rem;
      display: flex;
      align-items: center;
      gap: .7rem;
      color: #92400e;
      font-weight: 500;
    }

    /* ── Dettagli Tecnici / Codice ── */
    code, .mono {
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      font-size: .82rem;
      background: #f1f5f9;
      padding: .2rem .5rem;
      border-radius: 6px;
      color: #334155;
      word-break: break-all;
      border: 1px solid rgba(0,0,0,0.04);
    }
    details { margin-top: 2rem; }
    summary {
      cursor: pointer;
      color: var(--text-sec);
      font-size: .9rem;
      font-weight: 600;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "→"; font-size: .9rem; transition: transform .2s ease; color: var(--primary); font-weight: bold; }
    details[open] summary::before { transform: rotate(90deg); }
    .details-body {
      margin-top: .75rem;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .hint { font-size: .85rem; color: var(--text-muted); margin-top: .5rem; }
    p { margin: .75rem 0; color: var(--text-sec); }
    a { color: var(--primary); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">⚖&nbsp;<span class="accent">Aequ</span>itas</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/vote">Vota</a>
    <a href="/bulletin">Bollettino</a>
    <a href="/results">Risultati</a>
    {% if user %}
      <a href="/logout" class="nav-logout">Esci ({{ user.email }})</a>
    {% else %}
      <a href="/login" style="font-weight:600;color:var(--primary)">Accedi con Google</a>
    {% endif %}
  </div>
</nav>

<div class="page">
  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}<div class="flash">⚠️ {{ msg }}</div>{% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>
</body>
</html>
